version: '3.8'

services:
  db:
    image: postgres:15
    container_name: sport_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: sport_db
    ports:
      - '5433:5432'
    volumes:
      - sport_db_data:/var/lib/postgresql/data

volumes:
  sport_db_data:
